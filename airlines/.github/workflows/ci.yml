name : Testing
on : push

jobs : 
  test_project : 
    runs-on : ubuntu-latest
    steps : 
    - name : checkout code
      uses : actions/checkout@v3
    - name : setup python
      uses : actions/setup-python@v4
      with : 
        python-version : '3.12'
    - name : install dependencies
      run : pip install -r requirements.txt
    - name : run test
      run : python manage.py test